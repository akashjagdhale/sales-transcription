services:
  sales-transcriber:
    container_name: sales-transcriber
    build: .
    init: true
    mem_limit: 512m
    cpus: 0.5
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    environment:
      - PORT=${PORT}
      - FLASK_HOST=0.0.0.0
    labels:
      - traefik.enable=true
      - "traefik.http.routers.sales-transcriber.rule=Host(`${TRAEFIK_HOST}`)"
      - traefik.http.routers.sales-transcriber.entrypoints=websecure
      - traefik.http.routers.sales-transcriber.tls.certresolver=letsencrypt
      - traefik.http.routers.sales-transcriber.tls.domains[0].main=${TRAEFIK_HOST}
      - traefik.http.services.sales-transcriber.loadbalancer.server.port=${PORT}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:${PORT}/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
